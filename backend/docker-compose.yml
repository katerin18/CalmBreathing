services:
  postgres:
    image: postgres:16-alpine
    container_name: calm-breath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: calm_breath
      POSTGRES_USER: calm_user
      POSTGRES_PASSWORD: calm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calm_user -d calm_breath"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./calm_breath
      dockerfile: Dockerfile
    image: calm-breath-backend:latest
    container_name: calm-breath-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/calm_breath
      DB_USERNAME: calm_user
      DB_PASSWORD: calm_password
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      FRONTEND_URL: http://localhost:3000
      ACTUATOR_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  postgres_data: